name: Build DMG

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest Xcode 26.x
        run: |
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || echo "")
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg || true
        continue-on-error: true

      - name: Sync VERSION to project.yml
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          VERSION_PARTS=(${VERSION//./ })
          MAJOR="${VERSION_PARTS[0]}"
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: $VERSION/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $MAJOR/" project.yml

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild -scheme SwallpaperWorkshopLite -configuration Release clean archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            SWIFT_STRICT_CONCURRENCY=minimal \
            -archivePath build/SwallpaperWorkshopLite.xcarchive

      - name: Export App
        run: |
          cat > build/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>mac-application</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/SwallpaperWorkshopLite.xcarchive \
            -exportPath build \
            -exportOptionsPlist build/exportOptions.plist \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Create DMG
        run: |
          if command -v create-dmg &> /dev/null; then
            create-dmg --volname "SwallpaperWorkshopLite" --window-size 540 400 \
              --app-drop-link 400 185 --hide-extension "SwallpaperWorkshopLite.app" \
              --no-internet-enable build/SwallpaperWorkshopLite.dmg build/SwallpaperWorkshopLite.app || \
            hdiutil create -volname "SwallpaperWorkshopLite" -srcfolder build/SwallpaperWorkshopLite.app \
              -ov -format UDZO build/SwallpaperWorkshopLite.dmg
          else
            hdiutil create -volname "SwallpaperWorkshopLite" -srcfolder build/SwallpaperWorkshopLite.app \
              -ov -format UDZO build/SwallpaperWorkshopLite.dmg
          fi

      - name: Read Version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Push Tag
        run: |
          git tag -f "${{ steps.version.outputs.tag }}"
          git push -f origin "${{ steps.version.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Swallpaper Workshop Lite ${{ steps.version.outputs.version }}
          files: build/SwallpaperWorkshopLite.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
