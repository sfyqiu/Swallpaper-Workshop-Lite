name: Build DMG
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST/Contents/Developer" || true
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Sync VERSION
        run: |
          V=$(cat VERSION | tr -d '[:space:]')
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: $V/" project.yml
      - name: Generate
        run: xcodegen generate
      - name: Build Archive
        run: |
          xcodebuild -scheme SwallpaperWorkshopLite -configuration Release clean archive \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal -archivePath build/app.xcarchive
      - name: Export App
        run: |
          echo '<?xml version="1.0"?><plist><dict><key>method</key><string>mac-application</string></dict></plist>' > /tmp/export.plist
          xcodebuild -exportArchive -archivePath build/app.xcarchive -exportPath build \
            -exportOptionsPlist /tmp/export.plist \
            CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO
      - name: Create DMG
        run: |
          hdiutil create -volname "SwallpaperWorkshopLite" -srcfolder build/SwallpaperWorkshopLite.app \
            -ov -format UDZO build/SwallpaperWorkshopLite.dmg
      - name: Read Version
        id: version
        run: |
          V=$(cat VERSION | tr -d '[:space:]')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Swallpaper Workshop Lite ${{ steps.version.outputs.version }}
          files: build/SwallpaperWorkshopLite.dmg
