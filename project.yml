name: SwallpaperWorkshopLite
options:
  bundleIdPrefix: com.swallpaper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"
schemes:
  SwallpaperWorkshopLite:
    build:
      targets:
        SwallpaperWorkshopLite: all
packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.2.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.8.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
targets:
  SwallpaperWorkshopLite:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Utilities
      - path: Components
      - path: DesignSystem
      - path: Metal
      - path: Assets.xcassets
      - path: WallpaperEngineEmbeddedAssets.swift
      - path: Resources
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: SwallpaperWorkshopLite
        PRODUCT_BUNDLE_IDENTIFIER: com.swallpaper.workshoplite
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        OTHER_LDFLAGS: $(inherited) -framework LocalAuthentication
    dependencies:
      - package: SwiftSoup
      - package: Kanna
      - package: Kingfisher
    entitlements:
      path: Swallpaper.entitlements
      properties:
        com.apple.security.network.client: true
